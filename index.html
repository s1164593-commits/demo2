<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio | Personal Portfolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel for Browser Compilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion (UMD Bundle) & Lucide Icons -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,600&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: none;
        }
        
        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Fix for cursor visibility on mobile */
        @media (max-width: 1024px) {
            body { cursor: auto; }
        }
    </style>

    <script>
        // Tailwind Configuration for custom colors
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        purple: {
                            50: '#F5F3FF',
                            100: '#EDE9FE',
                            200: '#DDD6FE',
                            400: '#A78BFA',
                            500: '#8B5CF6',
                            600: '#7C3AED',
                            700: '#6D28D9',
                            900: '#4C1D95',
                        },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#FDFCFE] text-[#1E1428]">
    <div id="root"></div>

    <script type="text/babel">
        window.onload = () => {
            const { useState, useEffect } = React;
            
            // Handle different UMD global structures for Framer Motion
            const fm = window.FramerMotion || window.Motion;
            const motion = fm ? fm.motion : null;
            const AnimatePresence = fm ? fm.AnimatePresence : null;

            if (!motion) {
                console.error("Framer Motion failed to load from CDN. Checking window object:", window);
                // Fallback basic components to avoid white screen
                const Fallback = ({ children }) => <div>{children}</div>;
                window.motion = { div: Fallback, p: Fallback, h1: Fallback, section: Fallback };
                window.AnimatePresence = Fallback;
            }

            // Custom Icon Component to handle Lucide in CDN
            const Icon = ({ name, size = 20, className = "" }) => {
                useEffect(() => {
                    if (window.lucide) {
                        lucide.createIcons();
                    }
                }, [name]);
                return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
            };

            const CustomCursor = () => {
                const [position, setPosition] = useState({ x: 0, y: 0 });
                const [isHovering, setIsHovering] = useState(false);

                useEffect(() => {
                    const moveCursor = (e) => setPosition({ x: e.clientX, y: e.clientY });
                    window.addEventListener('mousemove', moveCursor);
                    return () => window.removeEventListener('mousemove', moveCursor);
                }, []);

                const MotionDiv = motion ? motion.div : 'div';

                return (
                    <MotionDiv
                        className="fixed top-0 left-0 w-6 h-6 rounded-full border-2 border-purple-500 pointer-events-none z-[9999] hidden lg:block"
                        animate={{
                            x: position.x - 12,
                            y: position.y - 12,
                            scale: isHovering ? 2.5 : 1,
                            backgroundColor: isHovering ? 'rgba(124, 77, 255, 0.1)' : 'transparent'
                        }}
                        transition={{ type: 'spring', damping: 20, stiffness: 250, mass: 0.5 }}
                    />
                );
            };

            const ProjectCard = ({ project, index }) => {
                const MotionDiv = motion ? motion.div : 'div';
                return (
                    <MotionDiv
                        initial={{ opacity: 0, y: 30 }}
                        whileInView={{ opacity: 1, y: 0 }}
                        viewport={{ once: true }}
                        transition={{ delay: index * 0.1 }}
                        className={`relative group overflow-hidden rounded-2xl bg-zinc-100 ${project.span}`}
                    >
                        <div className="aspect-[4/5] md:aspect-auto h-full w-full overflow-hidden">
                            <img 
                                src={project.image} 
                                alt={project.title}
                                className="object-cover w-full h-full grayscale group-hover:grayscale-0 group-hover:scale-105 transition-all duration-700 ease-in-out"
                            />
                        </div>
                        <div className="absolute inset-0 bg-gradient-to-t from-purple-900/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex flex-col justify-end p-8 text-white">
                            <p className="text-xs uppercase tracking-widest mb-2 font-medium text-purple-200">{project.category}</p>
                            <h3 className="text-2xl font-serif italic mb-4">{project.title}</h3>
                            <div className="flex gap-4">
                                <button className="p-2 rounded-full bg-white/10 backdrop-blur-md hover:bg-white/20 transition">
                                    <Icon name="external-link" size={18} />
                                </button>
                            </div>
                        </div>
                    </MotionDiv>
                );
            };

            const App = () => {
                const [isMenuOpen, setIsMenuOpen] = useState(false);
                const MotionDiv = motion ? motion.div : 'div';
                const MotionP = motion ? motion.p : 'p';
                const MotionH1 = motion ? motion.h1 : 'h1';
                const MotionH2 = motion ? motion.h2 : 'h2';
                const AP = AnimatePresence || React.Fragment;

                const projects = [
                    { title: "Velvet Interface", category: "UI/UX Design", image: "https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&q=80&w=800", span: "md:col-span-1 md:row-span-2" },
                    { title: "Aura Mobile", category: "Product Design", image: "https://images.unsplash.com/photo-1616469829581-73993eb86b02?auto=format&fit=crop&q=80&w=800", span: "md:col-span-1 md:row-span-1" },
                    { title: "Lumina Branding", category: "Visual Identity", image: "https://images.unsplash.com/photo-1634942537034-2531766767d1?auto=format&fit=crop&q=80&w=800", span: "md:col-span-1 md:row-span-1" },
                    { title: "Ether Flow", category: "Interaction", image: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=800", span: "md:col-span-2 md:row-span-1" },
                ];

                return (
                    <div className="min-h-screen bg-[#FDFCFE] text-[#1E1428] selection:bg-purple-100 selection:text-purple-700 overflow-x-hidden">
                        <CustomCursor />

                        {/* Navigation */}
                        <nav className="fixed top-0 w-full z-50 px-6 py-8 md:px-12 flex justify-between items-center backdrop-blur-sm bg-white/30">
                            <MotionDiv 
                                initial={{ opacity: 0, x: -20 }}
                                animate={{ opacity: 1, x: 0 }}
                                className="text-2xl font-black tracking-tighter"
                            >
                                STUDIO<span className="text-purple-600">.</span>
                            </MotionDiv>

                            <div className="hidden md:flex gap-10 text-xs uppercase tracking-[0.2em] font-bold">
                                <a href="#works" className="hover:text-purple-600 transition-colors relative group">
                                    Works
                                    <span className="absolute -bottom-1 left-0 w-0 h-[1px] bg-purple-600 transition-all group-hover:w-full"></span>
                                </a>
                                <a href="#about" className="hover:text-purple-600 transition-colors relative group">
                                    About
                                    <span className="absolute -bottom-1 left-0 w-0 h-[1px] bg-purple-600 transition-all group-hover:w-full"></span>
                                </a>
                                <a href="volunteer.html" className="hover:text-purple-600 transition-colors relative group">
                                    Volunteer
                                    <span className="absolute -bottom-1 left-0 w-0 h-[1px] bg-purple-600 transition-all group-hover:w-full"></span>
                                </a>
                                <a href="stem.html" className="hover:text-purple-600 transition-colors relative group">
                                    STEM
                                    <span className="absolute -bottom-1 left-0 w-0 h-[1px] bg-purple-600 transition-all group-hover:w-full"></span>
                                </a>
                                <a href="#contact" className="hover:text-purple-600 transition-colors relative group">
                                    Contact
                                    <span className="absolute -bottom-1 left-0 w-0 h-[1px] bg-purple-600 transition-all group-hover:w-full"></span>
                                </a>
                            </div>

                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                {isMenuOpen ? <Icon name="x" /> : <Icon name="menu" />}
                            </button>
                        </nav>

                        {/* Mobile Menu Overlay */}
                        <AP>
                            {isMenuOpen && (
                                <MotionDiv 
                                    initial={{ opacity: 0, y: -20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -20 }}
                                    className="fixed inset-0 bg-white z-40 flex flex-col items-center justify-center gap-8 text-3xl font-serif italic"
                                >
                                    <a href="#works" onClick={() => setIsMenuOpen(false)}>Selected Works</a>
                                    <a href="#about" onClick={() => setIsMenuOpen(false)}>The Designer</a>
                                    <a href="volunteer.html" onClick={() => setIsMenuOpen(false)}>Volunteer</a>
                                    <a href="stem.html" onClick={() => setIsMenuOpen(false)}>STEM Projects</a>
                                    <a href="#contact" onClick={() => setIsMenuOpen(false)}>Reach Out</a>
                                </MotionDiv>
                            )}
                        </AP>

                        <main>
                            {/* Hero Section */}
                            <section className="relative min-h-screen flex flex-col justify-center px-6 md:px-12 lg:px-24 overflow-hidden pt-20">
                                <div className="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-200/30 blur-[120px] rounded-full"></div>
                                
                                <div className="max-w-6xl relative z-10">
                                    <MotionP 
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.2 }}
                                        className="text-sm uppercase tracking-[0.4em] text-purple-600 font-bold mb-6"
                                    >
                                        Available for Q3 Projects
                                    </MotionP>
                                    
                                    <MotionH1 
                                        initial={{ opacity: 0, y: 30 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.3 }}
                                        className="text-6xl md:text-8xl lg:text-9xl font-serif italic leading-[0.85] tracking-tight"
                                    >
                                        Crafting <br />
                                        <span className="not-italic font-sans font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-indigo-600">
                                            Digital Soul.
                                        </span>
                                    </MotionH1>

                                    <MotionDiv 
                                        initial={{ opacity: 0 }}
                                        animate={{ opacity: 1 }}
                                        transition={{ delay: 0.6 }}
                                        className="mt-12 flex flex-col md:flex-row md:items-center gap-8"
                                    >
                                        <button className="group flex items-center gap-4 bg-[#1E1428] text-white px-8 py-4 rounded-full hover:bg-purple-700 transition-all duration-300 w-fit">
                                            <span className="font-bold tracking-tight text-white">View Selected Works</span>
                                            <div className="bg-white/20 p-1 rounded-full group-hover:rotate-45 transition-transform">
                                                <Icon name="arrow-up-right" size={20} />
                                            </div>
                                        </button>
                                        
                                        <div className="flex gap-6 text-[#5A5266]">
                                            <Icon name="github" className="hover:text-purple-600 cursor-pointer transition" />
                                            <Icon name="linkedin" className="hover:text-purple-600 cursor-pointer transition" />
                                            <Icon name="twitter" className="hover:text-purple-600 cursor-pointer transition" />
                                        </div>
                                    </MotionDiv>
                                </div>
                                
                                {/* Scroll Indicator */}
                                <MotionDiv 
                                    animate={{ y: [0, 10, 0] }} 
                                    transition={{ repeat: Infinity, duration: 2 }}
                                    className="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 opacity-30"
                                >
                                    <span className="text-[10px] uppercase tracking-widest font-bold">Scroll</span>
                                    <div className="w-[1px] h-12 bg-[#1E1428]"></div>
                                </MotionDiv>
                            </section>

                            {/* Info Section */}
                            <section id="about" className="py-32 px-6 md:px-12 lg:px-24 bg-white">
                                <div className="max-w-6xl mx-auto grid md:grid-cols-2 gap-20 items-center">
                                    <div className="space-y-8">
                                        <h2 className="text-4xl font-serif italic">The Philosophy</h2>
                                        <p className="text-xl text-[#5A5266] leading-relaxed">
                                            I believe that high-end design is not just about aesthetics, but about the 
                                            <span className="text-purple-600 font-medium italic"> intentional reduction</span> of noise. 
                                            Based in Brooklyn, I bridge the gap between complex engineering and human-centric beauty.
                                        </p>
                                        <div className="grid grid-cols-2 gap-8 border-t border-purple-100 pt-8">
                                            <div>
                                                <h4 className="text-xs uppercase tracking-widest text-purple-400 font-bold mb-2">Role</h4>
                                                <p className="font-medium">Lead Designer</p>
                                            </div>
                                            <div>
                                                <h4 className="text-xs uppercase tracking-widest text-purple-400 font-bold mb-2">Focus</h4>
                                                <p className="font-medium">Web / Motion</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="relative group">
                                        <div className="absolute -inset-4 bg-purple-50 rounded-2xl -z-10 group-hover:scale-105 transition-transform duration-500"></div>
                                        <img 
                                            src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=800" 
                                            className="rounded-xl w-full grayscale contrast-125"
                                            alt="Portrait"
                                        />
                                    </div>
                                </div>
                            </section>

                            {/* Masonry Grid Section */}
                            <section id="works" className="py-32 px-6 md:px-12 lg:px-24">
                                <div className="flex justify-between items-end mb-16">
                                    <div>
                                        <p className="text-xs uppercase tracking-[0.3em] text-purple-600 font-bold mb-4">Case Studies</p>
                                        <h2 className="text-5xl md:text-6xl font-serif italic">Selected Works</h2>
                                    </div>
                                    <button className="hidden md:flex items-center gap-2 text-sm font-bold border-b border-[#1E1428] pb-1 hover:text-purple-600 hover:border-purple-600 transition">
                                        See All Projects <Icon name="chevron-right" size={16} />
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10 auto-rows-fr">
                                    {projects.map((project, idx) => (
                                        <ProjectCard key={idx} project={project} index={idx} />
                                    ))}
                                </div>
                            </section>

                            {/* Contact Section */}
                            <section id="contact" className="py-40 px-6 md:px-12 lg:px-24 bg-[#1E1428] text-white rounded-t-[3rem] md:rounded-t-[5rem]">
                                <div className="max-w-6xl mx-auto text-center space-y-12">
                                    <MotionH2 
                                        whileInView={{ opacity: [0, 1], y: [20, 0] }}
                                        className="text-5xl md:text-8xl font-serif italic"
                                    >
                                        Let’s create <br />something <span className="text-purple-400">timeless.</span>
                                    </MotionH2>
                                    
                                    <div className="flex flex-wrap justify-center gap-6 pt-10">
                                        <a href="mailto:hello@studio.com" className="flex items-center gap-4 bg-white text-[#1E1428] px-10 py-5 rounded-full font-bold hover:scale-105 transition-transform">
                                            <Icon name="mail" size={20} />
                                            Send an Inquiry
                                        </a>
                                        <div className="flex items-center gap-6 px-4">
                                            <Icon name="linkedin" className="hover:text-purple-400 cursor-pointer transition" size={24} />
                                            <Icon name="twitter" className="hover:text-purple-400 cursor-pointer transition" size={24} />
                                        </div>
                                    </div>

                                    <div className="pt-24 border-t border-white/10 flex flex-col md:flex-row justify-between items-center text-sm text-white/40 uppercase tracking-widest gap-6">
                                        <p>© 2026 Studio All Rights Reserved</p>
                                        <div className="flex gap-8">
                                            <a href="#" className="hover:text-white transition">Privacy</a>
                                            <a href="#" className="hover:text-white transition">Terms</a>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        </main>
                    </div>
                );
            };

            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        };
    </script>
</body>
</html>
